services:
  - type: web
    name: pentestai-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NETTWIN_MODELS
        sync: gemini-3.5-flash,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-3-flash-preview,gemini-3.1-flash-lite
      - key: NETTWIN_MODEL
        value: gemini-3.5-flash
    healthCheckPath: /health
